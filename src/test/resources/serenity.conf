# Headed mode — visible Chrome window
headless.mode = false

webdriver {
  driver = chrome
  autodownload = false
  base.url = "http://172.17.172.217:3000"
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--start-maximized", "--disable-infobars", "--disable-gpu"]
      excludeSwitches = ["enable-automation"]
    }
  }
}

serenity {
  project.name = "Shoppers Serenity Framework"
  take.screenshots = FOR_FAILURES
  report.show.manual.tests = false
}
